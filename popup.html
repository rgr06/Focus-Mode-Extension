<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusForge</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body class="dark">
  <div class="card">

    <div class="header">
      <h1>FocusForge</h1>
      <span class="tagline">Stay focused. Earn rewards.</span>
    </div>

    <div class="inputs">
      <div class="input-box">
        <label>Focus Time</label>
        <input type="number" id="duration" value="1" min="1">
      </div>

      <div class="input-box">
        <label>Blocked Websites</label>
        <textarea id="blockedSites" rows="2"
          placeholder="youtube.com, instagram.com"></textarea>
      </div>
    </div>

    <button id="toggleFocusBtn" class="primary-btn">Start Focus</button>

    <div class="progress-wrapper">
      <div class="progress-container">
        <div id="progressBar"></div>
      </div>
      <p id="timerText"></p>
    </div>

    <p id="statusText">Status: Not focusing</p>

    <div class="stats">
      <div class="stat-box">
        <span id="points">0</span>
        <small>Points</small>
      </div>
      <div class="stat-box">
        <span id="level">Bronze</span>
        <small>Level</small>
      </div>
    </div>

    <div class="actions">
      <button id="openDashboard" class="secondary-btn">Dashboard</button>
      <button id="themeToggle" class="secondary-btn">Theme</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
