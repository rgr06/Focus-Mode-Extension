<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusForge Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>

  <div class="dashboard">

    <!-- HEADER -->
    <header class="top-bar">
      <h1>FocusForge</h1>
      <p class="subtitle">Productivity Dashboard</p>
    </header>

    <!-- MENU -->
    <nav class="menu">
      <button class="active" data-target="overview">Overview</button>
      <button data-target="rewards">Rewards</button>
      <button data-target="history">History</button>
    </nav>


    <!-- OVERVIEW SECTION -->
    <section id="overview" class="section active">
      <div class="summary-cards">
        <div class="summary-card">
          <span id="points">0</span>
          <small>Total Points</small>
        </div>

        <div class="summary-card">
          <span id="level">Bronze</span>
          <small>Current Level</small>
        </div>

        <div class="summary-card">
          <span id="streak">0</span>
          <small>Focus Streak (Days)</small>
        </div>
      </div>
    </section>

    <!-- REWARDS SECTION -->
    <section id="rewards" class="section">
      <h2>Redeem Rewards</h2>
      <div id="voucherList" class="voucher-grid"></div>
    </section>

    <!-- HISTORY SECTION -->
    <section id="history" class="section">
      <h2>Focus History</h2>
      <div id="calendar" class="history-grid"></div>
    </section>

  </div>

  <script src="dashboard.js"></script>

  <!-- MENU LOGIC (UI ONLY) -->
  <script>
    function showSection(id, btn) {
      document.querySelectorAll(".section").forEach(sec =>
        sec.classList.remove("active")
      );

      document.querySelectorAll(".menu button").forEach(b =>
        b.classList.remove("active")
      );

      document.getElementById(id).classList.add("active");
      btn.classList.add("active");
    }
</script>


</body>
</html>
